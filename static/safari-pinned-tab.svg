<!-- Safari pinned-tab mask: the "Summit" mark reduced to a monochrome
     silhouette. Safari requires a single flat colour on a transparent
     background, so the sky gradient, sun glow and snow caps drop out and
     only the sun, ridgeline and foreground pine carry the shape. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="#000000">
    <circle cx="32" cy="26" r="6.5"></circle>
    <path d="M0 64 L12 41 L22 50 L34 36 L46 49 L64 40 L64 64 Z"></path>
    <rect x="11.2" y="52" width="1.6" height="9"></rect>
    <path d="M12 42 L7.5 51 L16.5 51 Z"></path>
    <path d="M12 46.5 L8 54 L16 54 Z"></path>
  </g>
</svg>
