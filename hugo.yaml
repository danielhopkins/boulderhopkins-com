baseURL: https://boulderhopkins.com/
languageCode: en-us
title: boulder dan
theme: PaperMod

pagination:
  pagerSize: 10

params:
  env: production
  description: "Notes from the terminal — on building, leading, and tinkering"
  author: Dan Hopkins

  assets:
    favicon: "favicon.svg"

  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false

  homeInfoParams:
    Title: "boulder dan"
    Content: >
      Notes from the terminal — on building, leading, and tinkering

  socialIcons:
    - name: github
      url: "https://github.com/danielhopkins"
    - name: linkedin
      url: "https://www.linkedin.com/in/bolderdanh"
    - name: x
      url: "https://twitter.com/boulderDanH"
    - name: facebook
      url: "https://www.facebook.com/boulderDanielHopkins"
    - name: aboutme
      title: About.me
      url: "https://about.me/dhop"

  profileMode:
    enabled: false

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: applications
      name: Applications
      url: /applications/
      weight: 25
    - identifier: speaking
      name: Speaking
      url: /speaking/
      weight: 27
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: rss
      name: ""
      title: "RSS feed"
      pre: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="RSS feed"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>'
      url: /index.xml
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags

markup:
  highlight:
    style: monokai
    lineNos: false
    codeFences: true
    guessSyntax: true
